name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Generate index.html with correct assets
        run: |
          # Find the generated asset files
          JS_FILE=$(ls dist/client/assets/index-*.js | grep -v 'index-Bun' | head -1 | xargs basename)
          CSS_FILE=$(ls dist/client/assets/styles-*.css | head -1 | xargs basename)

          echo "JS file: $JS_FILE"
          echo "CSS file: $CSS_FILE"

          # Generate index.html
          cat > dist/client/index.html << EOF
          <!DOCTYPE html>
          <html lang="en">
            <head>
              <meta charset="UTF-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1.0" />
              <title>Kaviya Balamurugan — Java Full Stack Developer & AWS Cloud Engineer</title>
              <meta name="description" content="Portfolio of Kaviya Balamurugan — Java Full Stack Developer and AWS Cloud Engineer building scalable apps and reliable cloud systems." />
              <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💻</text></svg>" />
              <script type="module" crossorigin src="/personal_portfolio/assets/$JS_FILE"></script>
              <link rel="stylesheet" crossorigin href="/personal_portfolio/assets/$CSS_FILE" />
            </head>
            <body>
              <div id="root"></div>
            </body>
          </html>
          EOF

          # Copy for SPA routing (GitHub Pages 404 fallback)
          cp dist/client/index.html dist/client/404.html

          echo "=== Generated dist/client/index.html ==="
          cat dist/client/index.html

          echo "=== dist/client contents ==="
          ls -la dist/client/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist/client

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

