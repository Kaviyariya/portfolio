name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Prepare deployment
        run: |
          echo "=== Build output structure ==="
          find dist -type f | head -30
          echo ""
          echo "=== dist/client contents ==="
          ls -la dist/client/ || echo "dist/client does not exist"

      - name: Ensure index.html exists in deploy folder
        run: |
          # Determine deploy folder
          if [ -d dist/client ]; then
            DEPLOY_DIR="dist/client"
          else
            DEPLOY_DIR="dist"
          fi
          echo "Deploy dir: $DEPLOY_DIR"

          # Ensure index.html exists
          if [ ! -f "$DEPLOY_DIR/index.html" ]; then
            if [ -f "dist/index.html" ]; then
              cp dist/index.html "$DEPLOY_DIR/index.html"
            fi
          fi

          # Copy index.html to 404.html for SPA routing support
          if [ -f "$DEPLOY_DIR/index.html" ]; then
            cp "$DEPLOY_DIR/index.html" "$DEPLOY_DIR/404.html"
          fi

          echo "=== Final deploy contents ==="
          ls -la "$DEPLOY_DIR/"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist/client

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

