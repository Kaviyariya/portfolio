name: Deploy to GitHub Pages

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Create index.html
        run: |
          cd dist/client/assets
          JS_FILE=$(ls index-*.js | head -1)
          CSS_FILE=$(ls styles-*.css | head -1)
          cd ../..
          cat > dist/client/index.html << EOF
          <!DOCTYPE html>
          <html lang="en">
            <head>
              <meta charset="UTF-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1.0" />
              <title>Kaviya Balamurugan — Java Full Stack Developer & AWS Cloud Engineer</title>
              <meta name="description" content="Portfolio of Kaviya Balamurugan — Java Full Stack Developer and AWS Cloud Engineer building scalable apps and reliable cloud systems." />
              <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💻</text></svg>" />
              <script type="module" crossorigin src="/personal_portfolio/assets/$JS_FILE"></script>
              <link rel="stylesheet" crossorigin href="/personal_portfolio/assets/$CSS_FILE" />
            </head>
            <body>
              <div id="root"></div>
            </body>
          </html>
          EOF

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist/client